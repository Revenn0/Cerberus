<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cerberus Fleet Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Default theme (Professional Light) */
        --background-body: #f1f5f9; /* Slate 100 */
        --background-primary: #ffffff;
        --background-secondary: #f8fafc; /* Slate 50 */
        --background-tertiary: #e2e8f0; /* Slate 200 */
        --background-hover: #f1f5f9;
        
        --background-sidebar: #0f172a; /* Slate 900 */
        --text-sidebar: #cbd5e1; /* Slate 300 */
        --text-sidebar-hover: #ffffff;
        --bg-sidebar-hover: #1e293b; /* Slate 800 */

        --background-primary-translucent: rgba(255, 255, 255, 0.95);
        --background-secondary-translucent: rgba(248, 250, 252, 0.95);
        --background-backdrop: rgba(15, 23, 42, 0.4);

        --text-primary: #0f172a; /* Slate 900 */
        --text-secondary: #64748b; /* Slate 500 */
        --text-tertiary: #94a3b8; /* Slate 400 */
        
        --border-primary: #e2e8f0; /* Slate 200 */
        --border-secondary: #cbd5e1; /* Slate 300 */
        --border-primary-translucent: rgba(226, 232, 240, 0.8);
        
        --brand-text: #2563eb; /* Blue 600 */
        --brand-bg: #2563eb;
        --brand-hover: #1d4ed8; /* Blue 700 */
        --brand-ring: #60a5fa;
        
        --status-success-bg: #dcfce7;
        --status-success-text: #166534;
        --status-warning-bg: #fef9c3;
        --status-warning-text: #854d0e;
        --status-error-bg: #fee2e2;
        --status-error-text: #991b1b;
        --status-info-bg: #e0f2fe;
        --status-info-text: #075985;
      }

      body {
        font-family: 'Inter', sans-serif;
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.3s ease-out forwards;
      }

      /* Professional Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0"
  }
}
</script>
</head>
  <body class="bg-[var(--background-body)] text-[var(--text-primary)] antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
